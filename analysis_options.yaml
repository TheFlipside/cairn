# Strict static-analysis config. CI treats lints as errors; both
# `dart analyze` and `flutter analyze` must be clean (DESIGN.md §13).
include: package:very_good_analysis/analysis_options.yaml

analyzer:
  # Generated localization sources (flutter gen-l10n) are not hand-written and
  # are regenerated on `flutter pub get`; exclude them from the strict lints.
  exclude:
    - lib/l10n/app_localizations*.dart
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    missing_return: error
    dead_code: warning

linter:
  rules:
    - always_declare_return_types
    - prefer_final_locals
    - avoid_dynamic_calls
    - unawaited_futures
    - prefer_const_constructors
    - prefer_const_declarations

