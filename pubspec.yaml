name: cairn
description: "Personal health-data aggregator: reads HealthKit/Health Connect, writes Open mHealth files, syncs to your own Nextcloud."
# Private app — never published to pub.dev.
publish_to: "none"

# <version>+<build>. Bump the build number on every store/F-Droid upload.
version: 0.1.1+2

environment:
  sdk: ^3.12.0

# Kept alphabetical to satisfy the `sort_pub_dependencies` lint.
dependencies:
  cupertino_icons: ^1.0.8
  # Charts for the dashboard (hypnogram, sleep trend, stage breakdown) (MIT).
  fl_chart: ^1.0.0
  flutter:
    sdk: flutter
  # Flutter's official localization delegates (BSD-3-Clause); pairs with the
  # `gen-l10n` ARB workflow configured in l10n.yaml.
  flutter_localizations:
    sdk: flutter
  # App-token storage in Keychain / Android Keystore (BSD-3-Clause).
  flutter_secure_storage: ^10.3.1
  # Single wrapper over Apple HealthKit + Android Health Connect (MIT).
  health: ^13.3.0
  # Permissive HTTP client (BSD-3-Clause). We implement WebDAV + Nextcloud
  # Login Flow v2 on top of it instead of the AGPL-licensed `nextcloud` Dart
  # client, which would otherwise relicense the whole app to AGPL.
  http: ^1.6.0
  # Locale-aware message lookup + number/date formatting for i18n (BSD-3-Clause).
  # Version is left to Flutter's pin to stay compatible with flutter_localizations.
  intl: any
  # Path joining for the local OMH file cache (BSD-3-Clause).
  path: ^1.9.1
  # App-documents directory for the local OMH cache (BSD-3-Clause).
  path_provider: ^2.1.5
  # Opens the Nextcloud Login Flow v2 URL in the system browser, instead of
  # embedding a webview (BSD-3-Clause).
  url_launcher: ^6.3.1
  # RFC 4122 v4 UUIDs for OMH datapoint header ids (MIT).
  uuid: ^4.5.3
  # Opportunistic background sync via Android WorkManager / iOS BGTaskScheduler
  # (MIT; federated workmanager_android + workmanager_apple).
  workmanager: ^0.9.0+3
  # Parses the WebDAV PROPFIND multistatus XML response (MIT).
  xml: ^6.5.0

dev_dependencies:
  # Generates the Android/iOS launcher icons from assets/icon/ (see
  # flutter_launcher_icons.yaml); build-time only (MIT).
  flutter_launcher_icons: ^0.14.4
  flutter_test:
    sdk: flutter
  # Validates emitted OMH datapoints against the vendored JSON Schemas in
  # tests (Boost Software License — permissive).
  json_schema: ^5.2.2
  # Fake the path_provider platform in widget tests (BSD-3-Clause).
  path_provider_platform_interface: ^2.1.2
  # MockPlatformInterfaceMixin for the path_provider fake (BSD-3-Clause).
  plugin_platform_interface: ^2.1.8
  # Strict lint set; configured in analysis_options.yaml (MIT).
  very_good_analysis: ^10.2.0

flutter:
  uses-material-design: true
  # Generate localization sources from lib/l10n/*.arb (see l10n.yaml). The
  # generated app_localizations*.dart files are regenerated on `flutter pub get`
  # and are gitignored.
  generate: true
